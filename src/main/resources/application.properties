spring.application.name=dashboard

spring.datasource.url=jdbc:h2:file:./data/dashboard_bat;MODE=MySQL;DB_CLOSE_DELAY=-1;AUTO_RECONNECT=TRUE
spring.datasource.username=bat
spring.datasource.password=bat123
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=true


server.port=8080

app.upload.dir=${user.name}/dashboard-bat/uploads