<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/layout :: head('Chamado')"></head>
<body>
<div class="app">
    <div th:replace="fragments/layout :: sidebar('chamados')"></div>

    <div class="main">
        <div th:replace="fragments/layout :: topbar('Detalhe do Chamado')"></div>

        <div class="content">
            <div th:if="${sucesso}" class="alert-sucesso" th:text="${sucesso}"></div>
            <div th:if="${erro}" class="alert-erro" th:text="${erro}"></div>

            <div class="page-header">
                <h1>
                    Chamado #<span th:text="${chamado.id}"></span>
                    <span class="status-pill"
                          th:classappend="${chamado.status.name() == 'ABERTO'} ? 'pill-aberto' :
                            (${chamado.status.name() == 'EM_ANDAMENTO'} ? 'pill-andamento' :
                            (${chamado.status.name() == 'PAUSADO'} ? 'pill-pausado' :
                            (${chamado.status.name() == 'ESCALADO'} ? 'pill-escalado' : 'pill-concluido')))"
                          th:text="${chamado.status.name() == 'ABERTO'} ? 'Aberto' :
                            (${chamado.status.name() == 'EM_ANDAMENTO'} ? 'Em andamento' :
                            (${chamado.status.name() == 'PAUSADO'} ? 'Pausado' :
                            (${chamado.status.name() == 'ESCALADO'} ? 'Escalado' : 'Concluido')))">
                        Status
                    </span>
                </h1>
                <a th:href="@{/chamados}" class="btn-secundario">Voltar</a>
            </div>

            <div style="display:flex; gap:10px; margin-bottom:18px; justify-content:flex-end;">
                <form th:action="@{/chamados/{id}/excluir(id=${chamado.id})}" method="post"
                      onsubmit="return confirm('Excluir chamado #' + this.getAttribute('data-id') + '?')"
                      th:attr="data-id=${chamado.id}" style="margin:0;">
                    <button type="submit" class="btn-secundario" style="color:var(--vermelho);border-color:var(--vermelho-soft);">Excluir chamado</button>
                </form>
            </div>

            <div class="detalhe-grid">
                <div>
                    <div class="detalhe-card" style="margin-bottom:18px;">
                        <h2 th:text="${chamado.titulo}">Titulo</h2>
                        <p style="color:var(--texto-suave); margin-bottom:14px;" th:text="${chamado.descricao ?: 'Sem descricao'}"></p>
                        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; font-size:0.85rem;">
                            <div><strong>Maquina:</strong> <span th:text="${chamado.maquina != null ? chamado.maquina.nome : '-'}"></span></div>
                            <div><strong>Setor:</strong> <span th:text="${chamado.maquina != null and chamado.maquina.setor != null ? chamado.maquina.setor.nome : '-'}"></span></div>
                            <div><strong>Motivo da falha:</strong> <span th:text="${chamado.motivoFalha != null ? chamado.motivoFalha.name() : 'Nao informado'}"></span></div>
                            <div><strong>Abertura:</strong> <span th:text="${chamado.dataAbertura != null ? #temporals.format(chamado.dataAbertura, 'dd/MM/yyyy HH:mm') : '-'}"></span></div>
                            <div><strong>Tecnico:</strong> <span th:text="${chamado.tecnico != null ? chamado.tecnico.nome : 'Nao atribuido'}"></span></div>
                            <div><strong>Especialista:</strong> <span th:text="${chamado.especialista != null ? chamado.especialista.nome : '-'}"></span></div>
                        </div>
                    </div>

                    <div class="detalhe-card" th:if="${chamado.status.name() == 'ABERTO'}">
                        <h2>Atribuir Técnico</h2>
                        <div th:if="${sugestaoTecnico != null}" class="sugestao-rota">
                            <h3>Técnico recomendado pelo sistema</h3>
                            <div class="sugestao-info">
                                <span class="sugestao-nome" th:text="${sugestaoTecnico.tecnicoNome}"></span>
                                <span class="sugestao-det" th:text="'Setor: ' + ${sugestaoTecnico.tecnicoSetor}"></span>
                                <span class="sugestao-det" th:text="'Chamados ativos: ' + ${sugestaoTecnico.chamadosAtivos}"></span>
                                <span class="sugestao-det" th:text="'Experiencia: ' + ${sugestaoTecnico.experienciaMotivo} + ' resolucoes'"></span>
                                <div class="sugestao-just" th:text="${sugestaoTecnico.justificativa}"></div>
                            </div>
                            <form th:action="@{/chamados/{id}/auto-assumir(id=${chamado.id})}" method="post" style="margin-top:10px;">
                                <button type="submit" class="btn-primario">Atribuir automaticamente</button>
                            </form>
                        </div>
                        <form th:action="@{/chamados/{id}/assumir(id=${chamado.id})}" method="post" style="margin-top:14px;">
                            <label>Ou selecione manualmente:</label>
                            <select name="tecnicoId" required style="margin:0 8px;">
                                <option value="">Escolha um técnico</option>
                                <option th:each="t : ${tecnicos}" th:value="${t.id}" th:text="${t.nome}"></option>
                            </select>
                            <button type="submit" class="btn-primario">Assumir e iniciar</button>
                        </form>
                        <div class="empty-state" th:if="${tecnicos == null or tecnicos.isEmpty()}" style="margin-top:12px;padding:12px;">
                            Nenhum técnico cadastrado. <a th:href="@{/usuarios}" style="color:var(--bat-azul-claro);font-weight:700;">Cadastrar técnico</a>
                        </div>
                    </div>

                    <div class="detalhe-card" th:if="${chamado.status.name() != 'ABERTO'}">
                        <h2>Acoes</h2>
                        <div style="display:flex; flex-wrap:wrap; gap:10px; margin-top:8px;">
                            <form th:if="${chamado.status.name() == 'EM_ANDAMENTO' or chamado.status.name() == 'PAUSADO'}"
                                  th:action="@{/chamados/{id}/pausar(id=${chamado.id})}" method="post" style="margin:0;">
                                <button type="submit" class="btn-secundario">Pausar reparo</button>
                            </form>
                            <form th:if="${chamado.status.name() == 'PAUSADO'}"
                                  th:action="@{/chamados/{id}/retomar(id=${chamado.id})}" method="post" style="margin:0;">
                                <button type="submit" class="btn-primario">Retomar reparo</button>
                            </form>
                            <form th:if="${chamado.status.name() == 'EM_ANDAMENTO' or chamado.status.name() == 'ESCALADO'}"
                                  th:action="@{/chamados/{id}/concluir(id=${chamado.id})}" method="post" style="margin:0;">
                                <button type="submit" class="btn-primario">Concluir chamado</button>
                            </form>
                        </div>

                        <div th:if="${chamado.status.name() == 'EM_ANDAMENTO'}" style="margin-top:14px;">
                            <form th:action="@{/chamados/{id}/escalar(id=${chamado.id})}" method="post">
                                <label>Escalar para especialista:</label>
                                <select name="especialistaId" required style="margin:0 8px;">
                                    <option th:each="e : ${especialistas}" th:value="${e.id}" th:text="${e.nome}"></option>
                                </select>
                                <button type="submit" class="btn-secundario">Escalar</button>
                            </form>
                        </div>
                    </div>
                </div>

                <div>
                    <div class="cronometro" id="cronometro" th:classappend="${atrasado} ? 'atrasado' : ''">
                        <div class="crono-label" id="cronoLabel" th:text="${atrasado} ? 'Reparo atrasado!' : 'Tempo de reparo'"></div>
                        <div class="crono-val" id="cronoVal" th:text="${#numbers.formatDecimal(tempoReparoAtual / 60.0, 1, 1)} + ' min'">0 min</div>
                    </div>

                    <div class="detalhe-card" style="margin-top:18px;">
                        <h2>Notificacoes do chamado</h2>
                        <div th:if="${notificacoes != null and !notificacoes.isEmpty()}" style="display:flex; flex-direction:column; gap:8px;">
                            <div th:each="n : ${notificacoes}" style="padding:10px; background:var(--bat-azul-fundo); border-radius:8px; border:1px solid var(--borda);">
                                <div style="font-size:0.72rem; color:var(--texto-suave);" th:text="${#temporals.format(n.dataEnvio, 'dd/MM/yyyy HH:mm')}"></div>
                                <div style="font-size:0.84rem;" th:text="${n.mensagem}"></div>
                            </div>
                        </div>
                        <div class="empty-state" th:if="${notificacoes == null or notificacoes.isEmpty()}" style="padding:16px;">
                            Sem notificacoes.
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script th:inline="javascript" th:if="${chamado.status.name() == 'EM_ANDAMENTO'}">
        /* <![CDATA[ */
        var chamadoId = /*[[${chamado.id}]]*/ 0;
        var evtSource = new EventSource('/api/sse/chamado/' + chamadoId + '/tempo');
        var cronoVal = document.getElementById('cronoVal');
        var cronoLabel = document.getElementById('cronoLabel');
        var cronometro = document.getElementById('cronometro');

        evtSource.addEventListener('tempo', function (e) {
            var data = JSON.parse(e.data);
            if (data.formatado) {
                cronoVal.textContent = data.formatado;
            } else {
                cronoVal.textContent = (data.minutos).toFixed(1) + ' min';
            }
            if (data.atrasado) {
                cronometro.classList.add('atrasado');
                cronoLabel.textContent = 'Reparo atrasado!';
            } else {
                cronometro.classList.remove('atrasado');
                cronoLabel.textContent = 'Tempo de reparo';
            }
        });

        evtSource.onerror = function () {
            evtSource.close();
        };
        /* ]]> */
    </script>
</body>
</html>
