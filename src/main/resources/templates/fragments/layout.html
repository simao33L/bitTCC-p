<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(titulo)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${titulo} + ' | BAT Dashboard'">BAT Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
    <script th:src="@{/js/app.js}" defer></script>
    <script th:src="@{/js/chatbot.js}" defer></script>
</head>
<body>

<header class="topnav" th:fragment="sidebar(active)">
    <div class="topnav-inner">
        <a class="topnav-brand" th:href="@{/dashboard}">
            <img class="logo-bat" th:src="@{/bat_logo.png}" alt="BAT">
            <span class="brand-text">BAT <strong>Manutenção</strong></span>
        </a>

        <button class="topnav-toggle" type="button" onclick="toggleTopnav(event)" aria-label="Abrir menu">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                <path d="M4 6h16M4 12h16M4 18h16"></path>
            </svg>
        </button>

        <nav class="topnav-links">
            <a th:href="@{/dashboard}" th:classappend="${active == 'dashboard'} ? 'active' : ''">
                <span class="nav-label">Dashboard</span>
            </a>
            <a th:href="@{/chamados}" th:classappend="${active == 'chamados'} ? 'active' : ''">
                <span class="nav-label">Chamados</span>
                <span class="nav-badge" th:if="${totalAbertos != null and totalAbertos > 0}" th:text="${totalAbertos}">0</span>
            </a>
            <a th:href="@{/chamados/novo}" th:classappend="${active == 'novo'} ? 'active' : ''">
                <span class="nav-label">Abrir Chamado</span>
            </a>
            <a th:href="@{/ranking}" th:classappend="${active == 'ranking'} ? 'active' : ''">
                <span class="nav-label">Ranking</span>
            </a>
            <a th:href="@{/maquinas}" th:classappend="${active == 'maquinas'} ? 'active' : ''">
                <span class="nav-label">Máquinas</span>
            </a>
            <a th:href="@{/setores}" th:classappend="${active == 'setores'} ? 'active' : ''">
                <span class="nav-label">Setores</span>
            </a>
            <a th:href="@{/relatorios}" th:classappend="${active == 'relatorios'} ? 'active' : ''">
                <span class="nav-label">Relatórios</span>
            </a>
            <a th:href="@{/usuarios}" th:classappend="${active == 'usuarios'} ? 'active' : ''">
                <span class="nav-label">Usuários</span>
            </a>
            <a th:href="@{/api/metricas}" th:classappend="${active == 'api'} ? 'active' : ''">
                <span class="nav-label">API</span>
            </a>
        </nav>

        <div class="topnav-actions">
            <div class="notif-wrap">
                <button class="notif-btn" type="button" onclick="toggleNotif(event)" aria-label="Notificações">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                        <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                    </svg>
                    <span class="notif-badge" th:if="${totalAlertas != null and totalAlertas > 0}" th:text="${totalAlertas}">0</span>
                    <span class="notif-badge vazio" th:if="${totalAlertas == null or totalAlertas == 0}">0</span>
                </button>
                <div class="notif-panel" id="notifPanel">
                    <div class="notif-panel-head">
                        <h3>Notificações</h3>
                        <form th:action="@{/notificacoes/marcar-todas-lidas}" method="post" style="margin:0;">
                            <button type="submit" class="limpar-link" style="background:none;border:none;cursor:pointer;font-family:inherit;">Marcar todas como lidas</button>
                        </form>
                    </div>
                    <div class="notif-list" th:if="${ultimasNotificacoes != null and !ultimasNotificacoes.isEmpty()}">
                        <div class="notif-item" th:each="n : ${ultimasNotificacoes}">
                            <span class="notif-tag"
                                  th:classappend="${n.tipo.name() == 'ALERTA_30MIN'} ? 'tag-alerta' : (${n.tipo.name() == 'ESCALACAO'} ? 'tag-escalacao' : 'tag-conclusao')"
                                  th:text="${n.tipo.name() == 'ALERTA_30MIN'} ? 'Alerta' : (${n.tipo.name() == 'ESCALACAO'} ? 'Escalação' : 'Concluído')">
                                Alerta
                            </span>
                            <div class="notif-body">
                                <div class="notif-msg" th:text="${n.mensagem}">Mensagem</div>
                                <div class="notif-time" th:text="${#temporals.format(n.dataEnvio, 'dd/MM/yyyy HH:mm')}">data</div>
                            </div>
                        </div>
                    </div>
                    <div class="notif-empty" th:if="${ultimasNotificacoes == null or ultimasNotificacoes.isEmpty()}">
                        Nenhuma notificação no momento.
                    </div>
                </div>
            </div>

            <div class="user-chip">
                <div class="avatar" th:text="${usuarioLogadoNome != null and usuarioLogadoNome != '' ? usuarioLogadoNome.substring(0,2).toUpperCase() : '??'}">RB</div>
                <span class="user-nome" th:text="${usuarioLogadoNome != null and usuarioLogadoNome != '' ? usuarioLogadoNome : 'Não logado'}">Ricardo Barbosa</span>
                <form th:action="@{/logout}" method="post" style="margin:0 0 0 8px;">
                    <button type="submit" class="btn-logout" title="Sair">Sair</button>
                </form>
            </div>
        </div>
    </div>
</header>

<div class="page-title" th:fragment="topbar(titulo)">
    <div class="page-title-inner">
        <h1 th:text="${titulo}">Título</h1>
        <p>Sistema de gestão de chamados de manutenção industrial</p>
    </div>
</div>

</body>
</html>
