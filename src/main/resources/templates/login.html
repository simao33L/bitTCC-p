<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | BAT Dashboard</title>
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
    <style>
        .login-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--bat-azul) 0%, var(--bat-azul-medio) 100%);
        }
        .login-card {
            background: var(--branco);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px 36px;
            width: 100%;
            max-width: 420px;
        }
        .login-logo {
            display: flex;
            justify-content: center;
            margin-bottom: 28px;
        }
        .login-logo img {
            width: 72px;
            height: 72px;
            border-radius: 16px;
            background: var(--bat-azul-soft);
            padding: 8px;
        }
        .login-card h1 {
            text-align: center;
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--bat-azul);
            margin-bottom: 4px;
        }
        .login-card .login-sub {
            text-align: center;
            font-size: 0.82rem;
            color: var(--texto-suave);
            margin-bottom: 28px;
        }
        .login-form .form-field { margin-bottom: 18px; }
        .login-form label {
            display: block;
            font-size: 0.78rem;
            font-weight: 700;
            color: var(--texto-suave);
            margin-bottom: 6px;
        }
        .login-form input {
            width: 100%;
            border: 1px solid var(--borda);
            border-radius: 10px;
            padding: 12px 14px;
            font-family: inherit;
            font-size: 0.92rem;
            color: var(--texto);
            outline: none;
            transition: border 0.15s ease;
        }
        .login-form input:focus { border-color: var(--bat-azul-claro); }
        .login-btn {
            width: 100%;
            background: var(--bat-azul);
            color: var(--branco);
            border: none;
            border-radius: 10px;
            padding: 13px;
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: 800;
            cursor: pointer;
            transition: background 0.15s ease;
        }
        .login-btn:hover { background: var(--bat-azul-medio); }
        .login-alert {
            background: var(--vermelho-soft);
            color: var(--vermelho);
            border: 1px solid #f0c0bc;
            border-radius: 10px;
            padding: 12px 16px;
            margin-bottom: 20px;
            font-size: 0.84rem;
            font-weight: 700;
            text-align: center;
        }
        .login-success {
            background: var(--verde-soft);
            color: var(--verde);
            border: 1px solid #b8e0c8;
            border-radius: 10px;
            padding: 12px 16px;
            margin-bottom: 20px;
            font-size: 0.84rem;
            font-weight: 700;
            text-align: center;
        }
        .login-hint {
            margin-top: 22px;
            padding: 14px;
            background: var(--bat-azul-fundo);
            border-radius: 10px;
            border: 1px solid var(--borda);
            font-size: 0.78rem;
            color: var(--texto-suave);
        }
        .login-hint strong { color: var(--bat-azul); }
        .login-hint table { width: 100%; margin-top: 8px; font-size: 0.76rem; }
        .login-hint td { padding: 2px 4px; }
    </style>
</head>
<body>
<div class="login-page">
    <div class="login-card">
        <div class="login-logo">
            <img th:src="@{/bat_logo.png}" alt="BAT">
        </div>
        <h1>BAT Dashboard</h1>
        <p class="login-sub">Sistema de gestao de chamados de manutencao</p>

        <div class="login-alert" th:if="${param.error}">
            Login ou senha invalidos. Tente novamente.
        </div>
        <div class="login-success" th:if="${param.logout}">
            Voce saiu do sistema com sucesso.
        </div>

        <form class="login-form" th:action="@{/login}" method="post">
            <div class="form-field">
                <label for="username">Usuario</label>
                <input type="text" id="username" name="username" placeholder="Digite seu login" required autofocus>
            </div>
            <div class="form-field">
                <label for="password">Senha</label>
                <input type="password" id="password" name="password" placeholder="Digite sua senha" required>
            </div>
            <button type="submit" class="login-btn">Entrar</button>
        </form>
    </div>
</div>
<!-- VLibras -->
<div vw class="enabled">
    <div vw-access-button class="active"></div>
    <div vw-plugin-wrapper>
        <div class="vw-plugin-top-wrapper"></div>
    </div>
</div>

<script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>

<script>
    new window.VLibras.Widget('https://vlibras.gov.br/app');
</script>
</body>
</html>
