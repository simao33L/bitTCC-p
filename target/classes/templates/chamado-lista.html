<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/layout :: head('Chamados')"></head>
<body>
<div class="app">
    <div th:replace="fragments/layout :: sidebar('chamados')"></div>

    <div class="main">
        <div th:replace="fragments/layout :: topbar('Chamados')"></div>

        <div class="content">
            <div th:if="${sucesso}" class="alert-sucesso" th:text="${sucesso}"></div>

            <div class="page-header">
                <h1>Lista de Chamados</h1>
                <a th:href="@{/chamados/novo}" class="btn-primario">Abrir novo chamado</a>
            </div>

            <form class="filter-bar" th:action="@{/chamados}" method="get">
                <div class="field">
                    <label for="status">Status</label>
                    <select name="status" id="status" onchange="this.form.submit()">
                        <option value="">Todos</option>
                        <option value="ABERTO" th:selected="${statusFiltro == 'ABERTO'}">Abertos</option>
                        <option value="EM_ANDAMENTO" th:selected="${statusFiltro == 'EM_ANDAMENTO'}">Em andamento</option>
                        <option value="PAUSADO" th:selected="${statusFiltro == 'PAUSADO'}">Pausados</option>
                        <option value="ESCALADO" th:selected="${statusFiltro == 'ESCALADO'}">Escalados</option>
                        <option value="CONCLUIDO" th:selected="${statusFiltro == 'CONCLUIDO'}">Concluidos</option>
                    </select>
                </div>
                <button type="submit" class="btn-filtrar">Filtrar</button>
                <a th:href="@{/chamados}" class="btn-limpar" style="text-align:center;">Limpar</a>
            </form>

            <div class="tabela-wrap" th:if="${chamados != null and !chamados.isEmpty()}">
                <table class="tabela">
                    <thead>
                    <tr>
                        <th>#</th>
                        <th>Titulo</th>
                        <th>Maquina</th>
                        <th>Setor</th>
                        <th>Motivo</th>
                        <th>Status</th>
                        <th>Prioridade</th>
                        <th>Abertura</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="c : ${chamados}"
                        th:classappend="${c.atrasado} ? 'linha-atrasada' : ''">
                        <td th:text="${c.id}"></td>
                        <td class="titulo-cell">
                            <a th:href="@{/chamados/{id}(id=${c.id})}" th:text="${c.titulo}">Titulo</a>
                        </td>
                        <td th:text="${c.maquina != null ? c.maquina.nome : '-'}"></td>
                        <td th:text="${c.maquina != null and c.maquina.setor != null ? c.maquina.setor.nome : '-'}"></td>
                        <td th:text="${c.motivoFalha != null ? c.motivoFalha.name() : '-'}"></td>
                        <td>
                            <span class="status-pill"
                                  th:classappend="${c.status.name() == 'ABERTO'} ? 'pill-aberto' :
                                    (${c.status.name() == 'EM_ANDAMENTO'} ? 'pill-andamento' :
                                    (${c.status.name() == 'PAUSADO'} ? 'pill-pausado' :
                                    (${c.status.name() == 'ESCALADO'} ? 'pill-escalado' : 'pill-concluido')))"
                                  th:text="${c.status.name() == 'ABERTO'} ? 'Aberto' :
                                    (${c.status.name() == 'EM_ANDAMENTO'} ? 'Em andamento' :
                                    (${c.status.name() == 'PAUSADO'} ? 'Pausado' :
                                    (${c.status.name() == 'ESCALADO'} ? 'Escalado' : 'Concluido')))">
                                Status
                            </span>
                        </td>
                        <td>
                            <span th:if="${c.status.name() == 'EM_ANDAMENTO' or c.status.name() == 'ESCALADO'}"
                                  class="prioridade-badge"
                                  th:classappend="${c.atrasado} ? 'prioridade-atrasado' : 'prioridade-no-prazo'"
                                  th:text="${c.atrasado} ? 'Atrasado' : 'No prazo'">
                            </span>
                            <span th:unless="${c.status.name() == 'EM_ANDAMENTO' or c.status.name() == 'ESCALADO'}">-</span>
                        </td>
                        <td th:text="${c.dataAbertura != null ? #temporals.format(c.dataAbertura, 'dd/MM/yyyy HH:mm') : '-'}"></td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <div class="empty-state" th:if="${chamados == null or chamados.isEmpty()}">
                <p>Nenhum chamado encontrado.</p>
            </div>
        </div>
    </div>
</div>
</body>
</html>
